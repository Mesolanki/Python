name: Run Python Script
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Script
        run: python my_script.py
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git add .
          git commit -m "Auto-update data"
          git push

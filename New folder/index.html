<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python in HTML</title>
    
    <!-- Loading PyScript CSS and JS -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

    <h1>Python meets HTML</h1>
    <p>The output below is generated by Python:</p>

    <!-- This is where the Python output will appear -->
    <div id="output"></div>

    <!-- Your Python code goes here -->
    <script type="py">
        from pyscript import display
        import datetime

        now = datetime.datetime.now()
        message = f"Hello from Python! The current time is: {now.strftime('%H:%M:%S')}"
        
        # This displays the text in the browser
        display(message, target="output")
        
        print("This also appears in the browser console (F12)!")
    </script>

</body>
</html>
